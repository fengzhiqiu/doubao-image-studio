name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:  # 支持手动触发

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-13'       # Intel x86_64 runner
            args: '--target x86_64-apple-darwin'
            artifact_name: 'macos-intel'
            rust_targets: 'x86_64-apple-darwin'
            node_arch: 'x64'
          - platform: 'windows-latest'
            args: ''
            artifact_name: 'windows'
            rust_targets: ''
            node_arch: 'x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          architecture: ${{ matrix.node_arch }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Chrome Extension
        run: |
          cd doubao-extension
          PATH="../node_modules/.bin:$PATH" NODE_PATH="../node_modules" vite build

      - name: Install server dependencies (rebuild native modules for target arch)
        run: |
          cd server
          npm install
          npm rebuild better-sqlite3
          npm rebuild sharp

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && '豆包生图助手 v__VERSION__' || '' }}
          releaseBody: |
            ## 下载安装

            - **macOS (Intel)**: 下载 `x86_64.dmg` 文件，拖入 Applications 即可
            - **Windows**: 下载 `.msi` 或 `.exe` 文件运行安装

            ## 更新说明

            See commits for details.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload installers as Artifacts
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.artifact_name }}
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14
