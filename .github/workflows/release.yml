name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:  # 支持手动触发

jobs:
  build-tauri:
    permissions:
      contents: write
    runs-on: macos-13  # Intel x86_64 runner

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      # Chrome extension dist/ is pre-built and committed to git.
      # No need to rebuild here — doubao-extension/dist/ is already up to date.

      - name: Install server dependencies (rebuild native modules for Intel x86_64)
        run: |
          cd server
          npm install
          npm rebuild better-sqlite3
          npm rebuild sharp

      - name: Build Tauri app (macOS Intel x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && '豆包生图助手 v__VERSION__' || '' }}
          releaseBody: |
            ## 下载安装

            - **macOS (Intel)**: 下载 `.dmg` 文件，拖入 Applications 即可

            ## 更新说明

            See commits for details.
          releaseDraft: false
          prerelease: false
          args: --target x86_64-apple-darwin

      - name: Upload installers as Artifacts
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos-intel
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          if-no-files-found: warn
          retention-days: 14
